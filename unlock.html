<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Link — ShortLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="logo.png" />
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="unlock-page">
    <div class="unlock-card">
      <a href="/" class="unlock-logo">
        <img src="logo.png" alt="ShortLink Logo" class="nav-logo-img" />
        <span class="logo-text">ShortLink</span>
      </a>

      <div class="unlock-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>

      <h1 class="unlock-title">This link is password protected</h1>
      <p class="unlock-sub">Enter the password to continue to your destination.</p>

      <div class="unlock-form">
        <input type="password" id="unlock-password-input" class="edit-url-input" placeholder="Enter password" autocomplete="off" />
        <p id="unlock-error" class="slug-status err" style="display:none"></p>
        <button class="shorten-btn" id="unlock-submit-btn" onclick="submitUnlock()">
          <span>Unlock</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

      <p class="unlock-notfound" id="unlock-notfound" style="display:none">This link doesn't exist or is no longer available.</p>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <script src="unlock.js"></script>
</body>
</html>
